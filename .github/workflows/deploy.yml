name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        type: string
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
          - production

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch feature branch info
        run: |
          git fetch origin ${{ github.event.inputs.branch }} || echo "Branch may not exist yet"
          echo "Feature branch: ${{ github.event.inputs.branch }}"

      - name: Create deployment page
        run: |
          mkdir -p _site
          
          # Create an HTML page showing the deployment
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>MVAP Deployment - ${{ github.event.inputs.environment }}</title>
              <style>
                  * { box-sizing: border-box; margin: 0; padding: 0; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                      min-height: 100vh;
                      color: #e4e4e4;
                      padding: 40px 20px;
                  }
                  .container { max-width: 800px; margin: 0 auto; }
                  h1 { color: #00d4ff; margin-bottom: 10px; }
                  .badge {
                      display: inline-block;
                      padding: 5px 15px;
                      border-radius: 20px;
                      font-size: 14px;
                      font-weight: bold;
                      margin-bottom: 30px;
                  }
                  .badge.development { background: #2196F3; }
                  .badge.staging { background: #FF9800; }
                  .badge.production { background: #4CAF50; }
                  .card {
                      background: rgba(255,255,255,0.05);
                      border-radius: 12px;
                      padding: 25px;
                      margin-bottom: 20px;
                      border: 1px solid rgba(255,255,255,0.1);
                  }
                  .card h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.2rem; }
                  table { width: 100%; border-collapse: collapse; }
                  td { padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
                  td:first-child { color: #888; width: 140px; }
                  .success { color: #4CAF50; }
                  .files { font-family: monospace; font-size: 13px; color: #aaa; }
                  .footer { text-align: center; margin-top: 40px; color: #666; font-size: 13px; }
                  code { background: rgba(0,212,255,0.1); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>🚀 MVAP Deployment</h1>
                  <span class="badge ${{ github.event.inputs.environment }}">${{ github.event.inputs.environment }}</span>
                  
                  <div class="card">
                      <h2>Deployment Details</h2>
                      <table>
                          <tr><td>Environment</td><td>${{ github.event.inputs.environment }}</td></tr>
                          <tr><td>Feature Branch</td><td><code>${{ github.event.inputs.branch }}</code></td></tr>
                          <tr><td>Commit</td><td><code>${{ github.sha }}</code></td></tr>
                          <tr><td>Deployed At</td><td>TIMESTAMP_PLACEHOLDER</td></tr>
                          <tr><td>Status</td><td class="success">✅ Live</td></tr>
                      </table>
                  </div>
                  
                  <div class="card">
                      <h2>Deployed By</h2>
                      <table>
                          <tr><td>Agent</td><td>MVAP ReleaseAgent</td></tr>
                          <tr><td>Workflow</td><td>${{ github.workflow }}</td></tr>
                          <tr><td>Run ID</td><td>${{ github.run_id }}</td></tr>
                          <tr><td>Run Number</td><td>#${{ github.run_number }}</td></tr>
                      </table>
                  </div>
                  
                  <div class="card">
                      <h2>What's Deployed</h2>
                      <p style="color: #aaa; margin-bottom: 15px;">
                          Code generated by MVAP DevAgent and tested by TestAgent.
                      </p>
                      <p style="color: #888; font-size: 14px;">
                          View the PR: <a href="https://github.com/${{ github.repository }}/pulls" style="color: #00d4ff;">Open Pull Requests</a>
                      </p>
                  </div>
                  
                  <div class="footer">
                      <p>Deployed via MVAP - Minimal Viable Agent Platform</p>
                      <p>No LLM was used in this deployment workflow</p>
                  </div>
              </div>
          </body>
          </html>
          HTMLEOF
          
          # Replace timestamp placeholder
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          sed -i "s|TIMESTAMP_PLACEHOLDER|$TIMESTAMP|g" _site/index.html
          
          echo "✅ Deployment page created"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment Summary
        run: |
          echo ""
          echo "=============================================="
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "=============================================="
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Feature Branch: ${{ github.event.inputs.branch }}"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
          echo "=============================================="

